name: build-and-deploy-codewithrockstar.com
on:
  # Run after the engine is rebuilt
  workflow_run:
    workflows: ['release-rockstar-engine']
    types: [completed]
    branches: ['main']
  # Run after any website source files are changed
  push:
    branches: ["main"]
    paths:
      - 'codewithrockstar.com/**'
      - 'cm-lang-rockstar/**'
      - '.github/workflows/build-and-deploy-website.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-main-site:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
          working-directory: ./codewithrockstar.com
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Download WASM binary (triggered by release workflow)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: rockstar-wasm-binary
          path: rockstar-wasm-binary
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download WASM binary from latest successful release workflow (push/dispatch)
        if: github.event_name != 'workflow_run'
        run: |
          RUN_ID=$(gh run list --workflow release-rockstar-engine --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          gh run download "$RUN_ID" --name rockstar-wasm-binary --dir rockstar-wasm-binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy WASM binaries into site source
        run: |
          mkdir -p codewithrockstar.com/wasm
          cp -r rockstar-wasm-binary/* codewithrockstar.com/wasm/
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: build CodeMirror editor bundle with Rockstar language support
        run: |
          cd cm-lang-rockstar
          npm install
          npm run test
          npm run prepare
      - name: Build codewithrockstar.com site
        run: |
          cd codewithrockstar.com
          ls -l /home/runner/work/rockstar/rockstar/codewithrockstar.com/examples/01-getting-started/hello-world.rock
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./codewithrockstar.com/_site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-main-site
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
