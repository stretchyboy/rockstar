name: release-rockstar-engine
on:
  workflow_run:
    workflows: ['build-rockstar-2.0']
    types: [completed]
    branches: ['main']
  # push:
  #   branches: ["main"]
  #   paths:
  #     - 'Starship/**'
  #     - '.github/workflows/**'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "engine"
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release-rockstar-engine:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download binaries from triggering build workflow
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          pattern: rockstar-*-binary
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download binaries from latest successful build workflow (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          RUN_ID=$(gh run list --workflow build-rockstar-2.0 --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          gh run download "$RUN_ID" --pattern "rockstar-*-binary" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: upload WASM binary for website workflow
        uses: actions/upload-artifact@v4
        with:
          name: rockstar-wasm-binary
          path: rockstar-wasm-binary
          overwrite: true
      - name: extract version from binary
        id: version
        run: |
          ./rockstar-linux-x64-binary/rockstar --version
          echo "version=$(./rockstar-linux-x64-binary/rockstar --version)" >> $GITHUB_OUTPUT
      - name: create download assets
        run: |
          ls -lR
          zip rockstar-${{ steps.version.outputs.version }}-windows-x64.zip rockstar-windows-x64-binary/rockstar.exe
          tar -czf rockstar-${{ steps.version.outputs.version }}-macos-arm64.tar.gz rockstar-macos-arm64-binary/rockstar
          tar -czf rockstar-${{ steps.version.outputs.version }}-macos-x64.tar.gz rockstar-macos-x64-binary/rockstar
          tar -czf rockstar-${{ steps.version.outputs.version }}-linux-x64.tar.gz rockstar-linux-x64-binary/rockstar
      - name: create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: rockstar-${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            Rockstar ${{ steps.version.outputs.version }}
          files: |
            rockstar-${{ steps.version.outputs.version }}-windows-x64.zip
            rockstar-${{ steps.version.outputs.version }}-macos-arm64.tar.gz
            rockstar-${{ steps.version.outputs.version }}-macos-x64.tar.gz
            rockstar-${{ steps.version.outputs.version }}-linux-x64.tar.gz