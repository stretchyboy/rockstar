name: release-rockstar-engine
on:
  workflow_run:
    workflows: ['build-rockstar-2.0']
    types: [completed]
    branches: ['main']
  # push:
  #   branches: ["main"]
  #   paths:
  #     - 'Starship/**'
  #     - '.github/workflows/**'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "engine"
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release-rockstar-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: restore macOS ARM64 binary from cache
        uses: actions/cache/restore@v4
        id: restore-cached-macos-arm64-binary
        with:
          enableCrossOsArchive: true
          path: rockstar-macos-arm64-binary
          key: rockstar-macos-arm64-binary-${{ github.event.workflow_run.id || github.run_id }}
          restore-keys: |
            rockstar-macos-arm64-binary-
      - name: restore macOS x64 binary from cache
        uses: actions/cache/restore@v4
        id: restore-cached-macos-x64-binary
        with:
          enableCrossOsArchive: true
          path: rockstar-macos-x64-binary
          key: rockstar-macos-x64-binary-${{ github.event.workflow_run.id || github.run_id }}
          restore-keys: |
            rockstar-macos-x64-binary-
      - name: restore Linux binary from cache
        uses: actions/cache/restore@v4
        id: restore-cached-linux-binary
        with:
          enableCrossOsArchive: true
          path: rockstar-linux-x64-binary
          key: rockstar-linux-x64-binary-${{ github.event.workflow_run.id || github.run_id }}
          restore-keys: |
            rockstar-linux-x64-binary-
      - name: restore Windows binary from cache
        uses: actions/cache/restore@v4
        id: restore-cached-windows-x64-binary
        with:
          enableCrossOsArchive: true
          path: rockstar-windows-x64-binary
          key: rockstar-windows-x64-binary-${{ github.event.workflow_run.id || github.run_id }}
          restore-keys: |
            rockstar-windows-x64-binary-
      - name: restore WASM binary from cache
        uses: actions/cache/restore@v4
        id: restore-cached-rockstar-wasm-binary
        with:
          enableCrossOsArchive: true
          path: rockstar-wasm-binary
          key: rockstar-wasm-binary-${{ github.event.workflow_run.id || github.run_id }}
          restore-keys: |
            rockstar-wasm-binary-
      - name: extract version from binary
        id: version
        run: |
          ./rockstar-linux-x64-binary/rockstar --version
          echo "version=$(./rockstar-linux-x64-binary/rockstar --version)" >> $GITHUB_OUTPUT
      - name: create download assets
        run: |
          ls -lR
          zip rockstar-${{ steps.version.outputs.version }}-windows-x64.zip rockstar-windows-x64-binary/rockstar.exe
          tar -czf rockstar-${{ steps.version.outputs.version }}-macos-arm64.tar.gz rockstar-macos-arm64-binary/rockstar
          tar -czf rockstar-${{ steps.version.outputs.version }}-macos-x64.tar.gz rockstar-macos-x64-binary/rockstar
          tar -czf rockstar-${{ steps.version.outputs.version }}-linux-x64.tar.gz rockstar-linux-x64-binary/rockstar
      - name: re-save WASM binary for downstream website workflow
        uses: actions/cache/save@v4
        with:
          enableCrossOsArchive: true
          path: rockstar-wasm-binary
          key: rockstar-wasm-binary-${{ github.run_id }}
      - name: create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: rockstar-${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            Rockstar ${{ steps.version.outputs.version }}
          files: |
            rockstar-${{ steps.version.outputs.version }}-windows-x64.zip
            rockstar-${{ steps.version.outputs.version }}-macos-arm64.tar.gz
            rockstar-${{ steps.version.outputs.version }}-macos-x64.tar.gz
            rockstar-${{ steps.version.outputs.version }}-linux-x64.tar.gz